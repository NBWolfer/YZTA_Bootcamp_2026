services:
  - type: web
    name: healroute-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: USE_GEMINI
        value: "false"
      - key: ALLOWED_ORIGINS
        value: https://frontend-lemon-eta-50.vercel.app
